<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Zendesk - B2B e B2C</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      min-height: 100vh;
      padding: 20px;
      color: #e2e8f0;
    }

    .container {
      max-width: 1500px;
      margin: auto;
    }

    .header {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 28px;
      border-radius: 24px;
      margin-bottom: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    .header h1 {
      font-size: 34px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .header p {
      color: #cbd5e1;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
      margin-bottom: 24px;
    }

    .card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      transition: transform 0.3s ease;
    }

    .card:hover {
      transform: translateY(-4px);
    }

    .card h2 {
      color: #cbd5e1;
      font-size: 15px;
      margin-bottom: 14px;
      font-weight: 500;
    }

    .card .value {
      font-size: 42px;
      font-weight: bold;
      color: white;
    }

    .charts {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 24px;
      margin-bottom: 24px;
    }

    .chart-box,
    .form-section,
    table {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .chart-box,
    .form-section {
      padding: 24px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 18px;
      margin-top: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #e2e8f0;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.08);
      color: white;
      font-size: 15px;
      outline: none;
    }

    input::placeholder {
      color: #94a3b8;
    }

    button {
      border: none;
      padding: 14px 18px;
      border-radius: 14px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
      font-size: 14px;
    }

    .primary {
      background: linear-gradient(135deg, #2563eb, #3b82f6);
      color: white;
    }

    .primary:hover {
      transform: scale(1.03);
    }

    .secondary {
      background: linear-gradient(135deg, #0f766e, #14b8a6);
      color: white;
    }

    .secondary:hover {
      transform: scale(1.03);
    }

    .danger {
      background: linear-gradient(135deg, #b91c1c, #ef4444);
      color: white;
    }

    .danger:hover {
      transform: scale(1.03);
    }

    .delete-btn {
      background: #ef4444;
      color: white;
      padding: 8px 12px;
      border-radius: 10px;
      font-size: 12px;
    }

    .delete-btn:hover {
      background: #dc2626;
    }

    .actions {
      display: flex;
      gap: 12px;
      margin-top: 24px;
      flex-wrap: wrap;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      color: white;
    }

    th, td {
      padding: 16px;
      text-align: center;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    th {
      background: rgba(15,23,42,0.9);
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    tr:hover {
      background: rgba(255,255,255,0.05);
    }

    @media(max-width: 980px) {
      .charts {
        grid-template-columns: 1fr;
      }
    }

    @media(max-width: 600px) {
      .header h1 {
        font-size: 26px;
      }

      .card .value {
        font-size: 32px;
      }

      table {
        display: block;
        overflow-x: auto;
      }
    }
  </style>
</head>
<body>

<div class="container">

  <div class="header">
    <h1>Dashboard Zendesk - Status Diário</h1>
    <p>Controle diário de chamados B2B e B2C (Compartilhado)</p>
  </div>

  <div class="cards">
    <div class="card">
      <h2>Total B2B</h2>
      <div class="value" id="totalB2B">0</div>
    </div>

    <div class="card">
      <h2>Total B2C</h2>
      <div class="value" id="totalB2C">0</div>
    </div>

    <div class="card">
      <h2>Última Atualização</h2>
      <div class="value" id="ultimaData" style="font-size:22px">-</div>
    </div>
  </div>

  <div class="charts">
    <div class="chart-box">
      <h2 style="margin-bottom: 20px;">Evolução Diária</h2>
      <canvas id="lineChart"></canvas>
    </div>

    <div class="chart-box">
      <h2 style="margin-bottom: 20px;">Comparativo</h2>
      <canvas id="barChart"></canvas>
    </div>
  </div>

  <div class="form-section">
    <h2>Adicionar Novo Status Diário</h2>

    <div class="form-grid">
      <div>
        <label>Data</label>
        <input type="date" id="dataInput">
      </div>

      <div>
        <label>Status B2B</label>
        <input type="number" id="b2bInput" placeholder="Quantidade B2B">
      </div>

      <div>
        <label>Status B2C</label>
        <input type="number" id="b2cInput" placeholder="Quantidade B2C">
      </div>
    </div>

    <div class="actions">
      <button class="primary" id="btnAdicionar">Adicionar Registro</button>
      <button class="secondary" id="btnExportar">Exportar CSV</button>
      <button class="danger" id="btnLimpar">Limpar Dados</button>
    </div>
  </div>

  <table>
    <thead>
      <tr>
        <th>Data</th>
        <th>B2B</th>
        <th>B2C</th>
        <th>Total</th>
        <th>Ações</th>
      </tr>
    </thead>
    <tbody id="tabelaDados"></tbody>
  </table>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getDatabase, ref, set, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  // URL estritamente limpa e sem barras residuais no final
  const firebaseConfig = {
    apiKey: "AIzaSyBM_WqhDckDzgtxPl1qi7oKU8QiMqHbJIQ",
    authDomain: "dashboard-revers.firebaseapp.com",
    projectId: "dashboard-revers",
    storageBucket: "dashboard-revers.firebasestorage.app",
    messagingSenderId: "121809447249",
    appId: "1:121809447249:web:253b34182189a3053d0b70",
    measurementId: "G-6MZ4P5KJ65",
    databaseURL: "https://console.firebase.google.com/project/dashboard-revers/database?utm_source=chatgpt.com"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const dadosRef = ref(db, 'dashboard_zendesk');

  let dados = [];
  const tabela = document.getElementById('tabelaDados');

  function formatarData(data) {
    if(!data) return '-';
    const d = new Date(data + 'T00:00:00');
    return d.toLocaleDateString('pt-BR');
  }

  onValue(dadosRef, (snapshot) => {
    const dataFirebase = snapshot.val();
    dados = [];
    
    if (dataFirebase) {
      Object.keys(dataFirebase).forEach(key => {
        dados.push({
          id: key, 
          data: dataFirebase[key].data,
          b2b: Number(dataFirebase[key].b2b || 0),
          b2c: Number(dataFirebase[key].b2c || 0)
        });
      });
    }
    atualizarInterface();
  }, (error) => {
    console.error("Erro do Firebase:", error);
  });

  function atualizarInterface() {
    tabela.innerHTML = '';
    dados.sort((a, b) => new Date(a.data) - new Date(b.data));

    dados.forEach(item => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${formatarData(item.data)}</td>
        <td>${item.b2b}</td>
        <td>${item.b2c}</td>
        <td>${item.b2b + item.b2c}</td>
        <td>
          <button class="delete-btn" data-id="${item.id}">Excluir</button>
        </td>
      `;
      tr.querySelector('.delete-btn').addEventListener('click', () => removerRegistro(item.id));
      tabela.appendChild(tr);
    });

    atualizarCards();
    atualizarGraficos();
  }

  function atualizarCards() {
    const totalB2B = dados.reduce((acc, item) => acc + item.b2b, 0);
    const totalB2C = dados.reduce((acc, item) => acc + item.b2c, 0);
    document.getElementById('totalB2B').innerText = totalB2B;
    document.getElementById('totalB2C').innerText = totalB2C;
    const ultima = dados[dados.length - 1];
    document.getElementById('ultimaData').innerText = ultima ? formatarData(ultima.data) : '-';
  }

  function adicionarRegistro() {
    const data = document.getElementById('dataInput').value;
    const b2b = document.getElementById('b2bInput').value;
    const b2c = document.getElementById('b2cInput').value;

    if (!data || b2b === '' || b2c === '') {
      alert('Preencha todos os campos!');
      return;
    }

    const novoRegistroRef = push(dadosRef);
    set(novoRegistroRef, { 
      data: data, 
      b2b: Number(b2b), 
      b2c: Number(b2c) 
    })
    .then(() => {
      document.getElementById('dataInput').value = '';
      document.getElementById('b2bInput').value = '';
      document.getElementById('b2cInput').value = '';
    })
    .catch((error) => alert("Erro ao gravar: " + error.message));
  }

  function exportarCSV() {
    if (dados.length === 0) return;
    let csv = 'DATA;B2B;B2C\n';
    dados.forEach(item => { csv += `${item.data};${item.b2b};${item.b2c}\n`; });
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = 'dashboard_zendesk.csv';
    link.click();
  }

  function removerRegistro(id) {
    if (confirm('Deseja remover este registro?')) {
      const itemRef = ref(db, `dashboard_zendesk/${id}`);
      remove(itemRef);
    }
  }

  function limparDados() {
    if (confirm('Deseja apagar todos os dados do banco?')) {
      set(dadosRef, null);
    }
  }

  document.getElementById('btnAdicionar').addEventListener('click', adicionarRegistro);
  document.getElementById('btnExportar').addEventListener('click', exportarCSV);
  document.getElementById('btnLimpar').addEventListener('click', limparDados);

  let lineChart;
  let barChart;

  function atualizarGraficos() {
    const labels = dados.map(item => formatarData(item.data));
    const b2bData = dados.map(item => item.b2b);
    const b2cData = dados.map(item => item.b2c);

    if (lineChart) lineChart.destroy();
    if (barChart) barChart.destroy();

    lineChart = new Chart(document.getElementById('lineChart'), {
      type: 'line',
      data: {
        labels,
        datasets: [
          { label: 'B2B', data: b2bData, borderColor: '#2563eb', backgroundColor: 'rgba(37, 99, 235, 0.2)', tension: 0.3 },
          { label: 'B2C', data: b2cData, borderColor: '#16a34a', backgroundColor: 'rgba(22, 163, 74, 0.2)', tension: 0.3 }
        ]
      },
      options: { responsive: true, plugins: { legend: { position: 'top' } } }
    });

    barChart = new Chart(document.getElementById('barChart'), {
      type: 'bar',
      data: {
        labels: ['B2B', 'B2C'],
        datasets: [{
          label: 'Quantidade Total',
          data: [b2bData.reduce((a,b) => a+b, 0), b2cData.reduce((a,b) => a+b, 0)],
          backgroundColor: ['#2563eb', '#16a34a']
        }]
      },
      options: { responsive: true, plugins: { legend: { display: false } } }
    });
  }
</script>
</body>
</html>
