<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard RH - Divergências de Ponto</title>
<style>
:root{--red:#ef4444;--yellow:#f59e0b;--green:#22c55e;--blue:#2563eb;}
body{margin:0;background:#f8fafc;font-family:Segoe UI,Arial,sans-serif}
.header{background:#111827;color:#fff;padding:20px 30px}
.container{max-width:1400px;margin:auto;padding:24px}
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.card{background:#fff;padding:18px;border-radius:16px;box-shadow:0 2px 10px rgba(0,0,0,.08)}
.red{border-left:6px solid var(--red)} .yellow{border-left:6px solid var(--yellow)}
.green{border-left:6px solid var(--green)} .blue{border-left:6px solid var(--blue)}
.value{font-size:34px;font-weight:bold}
.panel{background:#fff;padding:20px;border-radius:16px;margin-top:20px;box-shadow:0 2px 10px rgba(0,0,0,.08)}
.grid{display:grid;grid-template-columns:2fr 1fr 3fr auto;gap:10px}
input,select,button{padding:12px;border:1px solid #ddd;border-radius:10px}
button{cursor:pointer;border:none;color:#fff;background:var(--blue)}
.btn-danger{background:#dc2626}
.btn-success{background:#16a34a}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:15px}
table{width:100%;border-collapse:collapse}
th,td{padding:12px;border-bottom:1px solid #eee;text-align:left;vertical-align:top}
.badge{padding:6px 10px;border-radius:20px;color:#fff;font-size:12px;font-weight:bold}
.pendente{background:var(--red)} .aguardando{background:var(--yellow)} .resolvido{background:var(--green)}
</style>
</head>
<body>
<div class="header">
<h1>📋 Dashboard de Divergências de Ponto</h1>
<p>Controle de inconsistências • Firebase Firestore</p>
</div>

<div class="container">
<div class="cards">
<div class="card red"><div>Pendentes</div><div id="pend" class="value">0</div></div>
<div class="card yellow"><div>Aguardando RH</div><div id="agu" class="value">0</div></div>
<div class="card green"><div>Resolvidos</div><div id="res" class="value">0</div></div>
<div class="card blue"><div>Total</div><div id="tot" class="value">0</div></div>
</div>

<div class="panel">
<h3>Nova Divergência</h3>
<div class="grid">
<input id="colaborador" placeholder="Nome do colaborador">
<input id="data" type="date">
<input id="motivo" placeholder="Motivo da divergência">
<button onclick="adicionar()">Adicionar</button>
</div>
</div>

<div class="panel">
<div class="toolbar">
<input id="pesquisa" placeholder="🔍 Pesquisar colaborador..." oninput="carregar()">
<select id="filtro" onchange="carregar()"><option>Todos</option></select>
<button class="btn-success" onclick="exportarExcel()">📥 Exportar Excel</button>
<button class="btn-danger" onclick="excluirTudo()">🗑 Limpar Base</button>
</div>

<table>
<thead>
<tr>
<th>Colaborador</th>
<th>Data</th>
<th>Motivo</th>
<th>Status</th>
<th>Chamado</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="tb"></tbody>
</table>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={
 apiKey:"SUA_APIKEY",
 authDomain:"dashboard-revers.firebaseapp.com",
 projectId:"dashboard-revers",
 storageBucket:"dashboard-revers.firebasestorage.app",
 messagingSenderId:"121809447249",
 appId:"1:121809447249:web:253b34182189a3053d0b70",
 measurementId:"G-6MZ4P5KJ65"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
let cache=[];

window.adicionar=async()=>{
 const c=colaborador.value.trim(), d=data.value, m=motivo.value.trim();
 if(!c||!d||!m) return alert('Preencha todos os campos');
 await addDoc(collection(db,'divergencias'),{
  colaborador:c,data:d,motivo:m,status:'Pendente',chamado:'',
  criadoEm:serverTimestamp(), atualizadoEm:serverTimestamp()
 });
 colaborador.value=''; data.value=''; motivo.value='';
 carregar();
};

window.mudarStatus=async(id,status)=>{
 await updateDoc(doc(db,'divergencias',id),{status,atualizadoEm:serverTimestamp()});
 carregar();
};

window.atualizarChamado=async(id,valor)=>{
 await updateDoc(doc(db,'divergencias',id),{chamado:valor,atualizadoEm:serverTimestamp()});
};

window.excluir=async(id)=>{
 if(confirm('Excluir divergência?')){
   await deleteDoc(doc(db,'divergencias',id));
   carregar();
 }
};

window.excluirTudo=async()=>{
 if(!confirm('Deseja excluir TODAS as divergências?')) return;
 if(!confirm('A ação é permanente. Confirmar?')) return;
 const snap=await getDocs(collection(db,'divergencias'));
 await Promise.all(snap.docs.map(d=>deleteDoc(doc(db,'divergencias',d.id))));
 carregar();
};

window.exportarExcel=()=>{
 let csv="Colaborador;Data;Motivo;Status;Chamado\n";
 cache.forEach(x=>{
  csv+=`${x.colaborador};${x.data};${x.motivo};${x.status};${x.chamado||''}\n`;
 });
 const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
 const a=document.createElement('a');
 a.href=URL.createObjectURL(blob);
 a.download='divergencias_ponto.csv';
 a.click();
};

window.carregar=async()=>{
 const snap=await getDocs(collection(db,'divergencias'));
 cache=[]; tb.innerHTML='';
 let p=0,a=0,r=0,t=0;
 const nomes=new Set();

 snap.forEach(d=>{
  const x={id:d.id,...d.data()};
  cache.push(x); nomes.add(x.colaborador);
  if(x.status==='Pendente')p++;
  if(x.status==='Aguardando')a++;
  if(x.status==='Resolvido')r++;
  t++;
 });

 const pes=pesquisa.value.toLowerCase();
 const fil=filtro.value;

 cache.filter(x=>(!pes||x.colaborador.toLowerCase().includes(pes))&&(fil==='Todos'||x.colaborador===fil))
 .forEach(x=>{
 const cls=x.status==='Pendente'?'pendente':x.status==='Aguardando'?'aguardando':'resolvido';
 tb.innerHTML+=`<tr>
<td>${x.colaborador}</td>
<td>${new Date(x.data+'T00:00').toLocaleDateString('pt-BR')}</td>
<td>${x.motivo}</td>
<td><span class="badge ${cls}">${x.status}</span><br><br>
<select onchange="mudarStatus('${x.id}',this.value)">
<option ${x.status==='Pendente'?'selected':''}>Pendente</option>
<option ${x.status==='Aguardando'?'selected':''}>Aguardando</option>
<option ${x.status==='Resolvido'?'selected':''}>Resolvido</option>
</select></td>
<td><input type="text" value="${x.chamado||''}" placeholder="Nº Chamado"
onchange="atualizarChamado('${x.id}',this.value)" style="width:130px"></td>
<td><button class="btn-danger" onclick="excluir('${x.id}')">Excluir</button></td>
</tr>`;
 });

 pend.textContent=p; agu.textContent=a; res.textContent=r; tot.textContent=t;

 const atual=filtro.value;
 filtro.innerHTML='<option>Todos</option>';
 [...nomes].sort().forEach(n=>filtro.innerHTML+=`<option value="${n}">${n}</option>`);
 if([...nomes].includes(atual)) filtro.value=atual;
};

carregar();
</script>
</body>
</html>
