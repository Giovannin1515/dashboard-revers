<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Dashboard Zendesk - Firebase</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      min-height: 100vh;
      padding: 20px;
      color: #e2e8f0;
    }

    .container {
      max-width: 1500px;
      margin: auto;
    }

    .header {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 28px;
      border-radius: 24px;
      margin-bottom: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    .header h1 {
      font-size: 34px;
      margin-bottom: 8px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
      margin-bottom: 24px;
    }

    .card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 24px;
    }

    .card h2 {
      font-size: 15px;
      margin-bottom: 14px;
    }

    .card .value {
      font-size: 42px;
      font-weight: bold;
    }

    .charts {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 24px;
      margin-bottom: 24px;
    }

    .chart-box,
    .form-section,
    table {
      background: rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 24px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 18px;
      margin-top: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      border: none;
      background: rgba(255,255,255,0.08);
      color: white;
    }

    button {
      border: none;
      padding: 14px 18px;
      border-radius: 14px;
      cursor: pointer;
      color: white;
      font-weight: bold;
    }

    .primary {
      background: #2563eb;
    }

    .secondary {
      background: #0f766e;
    }

    .danger {
      background: #dc2626;
    }

    .delete-btn {
      background: #ef4444;
      padding: 8px 12px;
      border-radius: 10px;
    }

    .actions {
      display: flex;
      gap: 12px;
      margin-top: 24px;
      flex-wrap: wrap;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      color: white;
    }

    th, td {
      padding: 16px;
      text-align: center;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    th {
      background: rgba(15,23,42,0.9);
    }

    @media(max-width:980px){
      .charts{
        grid-template-columns:1fr;
      }
    }

  </style>

</head>

<body>

<div class="container">

  <div class="header">

    <h1>Dashboard Zendesk - Firebase</h1>

    <p>Atualização em tempo real</p>

  </div>

  <div class="cards">

    <div class="card">
      <h2>Total B2B</h2>
      <div class="value" id="totalB2B">0</div>
    </div>

    <div class="card">
      <h2>Total B2C</h2>
      <div class="value" id="totalB2C">0</div>
    </div>

    <div class="card">
      <h2>Última Atualização</h2>
      <div class="value" id="ultimaData" style="font-size:22px">-</div>
    </div>

  </div>

  <div class="charts">

    <div class="chart-box">
      <h2 style="margin-bottom:20px;">Evolução Diária</h2>
      <canvas id="lineChart"></canvas>
    </div>

    <div class="chart-box">
      <h2 style="margin-bottom:20px;">Comparativo</h2>
      <canvas id="barChart"></canvas>
    </div>

  </div>

  <div class="form-section">

    <h2>Adicionar Registro</h2>

    <div class="form-grid">

      <div>
        <label>Data</label>
        <input type="date" id="dataInput">
      </div>

      <div>
        <label>B2B</label>
        <input type="number" id="b2bInput">
      </div>

      <div>
        <label>B2C</label>
        <input type="number" id="b2cInput">
      </div>

    </div>

    <div class="actions">

      <button class="primary" onclick="adicionarRegistro()">
        Adicionar
      </button>

      <button class="secondary" onclick="exportarCSV()">
        Exportar CSV
      </button>

      <button class="danger" onclick="limparDados()">
        Limpar
      </button>

    </div>

  </div>

  <table>

    <thead>

      <tr>
        <th>Data</th>
        <th>B2B</th>
        <th>B2C</th>
        <th>Total</th>
        <th>Ações</th>
      </tr>

    </thead>

    <tbody id="tabelaDados"></tbody>

  </table>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics.js";

import {
  getFirestore,
  collection,
  addDoc,
  deleteDoc,
  doc,
  onSnapshot,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

  apiKey: "AIzaSyBM_WqhDckDzgtxPl1qi7oKU8QiMqHbJIQ",

  authDomain: "dashboard-revers.firebaseapp.com",

  projectId: "dashboard-revers",

  storageBucket: "dashboard-revers.firebasestorage.app",

  messagingSenderId: "121809447249",

  appId: "1:121809447249:web:253b34182189a3053d0b70",

  measurementId: "G-6MZ4P5KJ65"

};

const app = initializeApp(firebaseConfig);

const analytics = getAnalytics(app);

const db = getFirestore(app);

let dados = [];

const tabela = document.getElementById('tabelaDados');

let lineChart;

let barChart;

function formatarData(data){

  const d = new Date(data + 'T00:00:00');

  return d.toLocaleDateString('pt-BR');

}

function atualizarTabela(){

  tabela.innerHTML = '';

  dados.sort((a,b)=>new Date(a.data)-new Date(b.data));

  dados.forEach(item=>{

    tabela.innerHTML += `

      <tr>

        <td>${formatarData(item.data)}</td>

        <td>${item.b2b}</td>

        <td>${item.b2c}</td>

        <td>${item.b2b + item.b2c}</td>

        <td>

          <button 
            class="delete-btn"
            onclick="removerRegistro('${item.id}')"
          >
            Excluir
          </button>

        </td>

      </tr>

    `;

  });

  atualizarCards();

  atualizarGraficos();

}

function atualizarCards(){

  const totalB2B =
    dados.reduce((acc,item)=>acc + item.b2b,0);

  const totalB2C =
    dados.reduce((acc,item)=>acc + item.b2c,0);

  document.getElementById('totalB2B').innerText = totalB2B;

  document.getElementById('totalB2C').innerText = totalB2C;

  const ultima = dados[dados.length - 1];

  document.getElementById('ultimaData').innerText =
    ultima ? formatarData(ultima.data) : '-';

}

window.adicionarRegistro = async function(){

  const data =
    document.getElementById('dataInput').value;

  const b2b =
    Number(document.getElementById('b2bInput').value);

  const b2c =
    Number(document.getElementById('b2cInput').value);

  if(!data || isNaN(b2b) || isNaN(b2c)){

    alert('Preencha todos os campos');

    return;

  }

  await addDoc(collection(db,"dashboard"),{

    data,
    b2b,
    b2c

  });

  document.getElementById('dataInput').value = '';

  document.getElementById('b2bInput').value = '';

  document.getElementById('b2cInput').value = '';

}

window.exportarCSV = function(){

  let csv = 'DATA;B2B;B2C\n';

  dados.forEach(item=>{

    csv += `${item.data};${item.b2b};${item.b2c}\n`;

  });

  const blob = new Blob([csv],{
    type:'text/csv;charset=utf-8;'
  });

  const link = document.createElement('a');

  link.href = URL.createObjectURL(blob);

  link.download = 'dashboard.csv';

  link.click();

}

window.removerRegistro = async function(id){

  if(confirm('Excluir registro?')){

    await deleteDoc(doc(db,"dashboard",id));

  }

}

window.limparDados = async function(){

  if(confirm('Limpar todos os dados?')){

    const snapshot =
      await getDocs(collection(db,"dashboard"));

    snapshot.forEach(async(item)=>{

      await deleteDoc(doc(db,"dashboard",item.id));

    });

  }

}

function atualizarGraficos(){

  const labels =
    dados.map(item=>formatarData(item.data));

  const b2bData =
    dados.map(item=>item.b2b);

  const b2cData =
    dados.map(item=>item.b2c);

  if(lineChart) lineChart.destroy();

  if(barChart) barChart.destroy();

  lineChart = new Chart(
    document.getElementById('lineChart'),
    {
      type:'line',

      data:{

        labels,

        datasets:[

          {
            label:'B2B',
            data:b2bData,
            borderColor:'#2563eb',
            backgroundColor:'rgba(37,99,235,0.2)',
            tension:0.3
          },

          {
            label:'B2C',
            data:b2cData,
            borderColor:'#16a34a',
            backgroundColor:'rgba(22,163,74,0.2)',
            tension:0.3
          }

        ]

      }

    }
  );

  barChart = new Chart(
    document.getElementById('barChart'),
    {

      type:'bar',

      data:{

        labels:['B2B','B2C'],

        datasets:[{

          data:[

            b2bData.reduce((a,b)=>a+b,0),

            b2cData.reduce((a,b)=>a+b,0)

          ],

          backgroundColor:[
            '#2563eb',
            '#16a34a'
          ]

        }]

      }

    }
  );

}

onSnapshot(collection(db,"dashboard"),(snapshot)=>{

  dados = [];

  snapshot.forEach((docItem)=>{

    dados.push({

      id:docItem.id,

      ...docItem.data()

    });

  });

  atualizarTabela();

});

</script>

</body>

</html>
